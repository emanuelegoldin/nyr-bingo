name: ci

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'docs/**'
      - 'nextjs/specs/**'
      - '**/*.example'
      - '**/*.md'
      - '**/.dockerignore'
      - '**/.gitignore'
      - '**/.modified'
      - '.devcontainer/**'
  workflow_dispatch:
      
permissions:
  contents: write
  packages: write

jobs:
  compute-release-version:
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.semantic.outputs.new_release_version }}
      published: ${{ steps.semantic.outputs.new_release_published }}
    steps:
      - uses: actions/checkout@v6
      - name: Semantic Release
        id: semantic
        uses: cycjimmy/semantic-release-action@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Maybe Access Token is required

  build-and-push-nextjs-app:
    if: &run-on-release ${{ needs.compute-release-version.outputs.published == 'true' }}
    needs: compute-release-version
    uses: ./.github/workflows/docker-build-and-push.yml
    with:
      dockerfile: nextjs/docker/Dockerfile.nextjs
      context: nextjs/
      username: ${{ github.actor }}
      image_name: nextjs-app
      image_version: &version ${{ needs.compute-release-version.outputs.version }}
      registry: &registry ghcr.io/${{ github.repository_owner }}
    secrets: &secrets
      token: ${{ secrets.GITHUB_TOKEN }}
  build-and-push-mariadb:
    if: *run-on-release
    needs: compute-release-version
    uses: ./.github/workflows/docker-build-and-push.yml
    with:
      dockerfile: database/docker/Dockerfile.mariadb
      context: database/
      username: ${{ github.actor }}
      image_name: mariadb
      image_version: *version
      registry: *registry
    secrets: *secrets
  build-and-push-nginx:
    if: *run-on-release
    needs: compute-release-version
    uses: ./.github/workflows/docker-build-and-push.yml
    with:
      dockerfile: nextjs/docker/Dockerfile.nginx
      context: nextjs/
      username: ${{ github.actor }}
      image_name: nginx
      image_version: *version
      registry: *registry
    secrets: *secrets
  build-and-push-flyway:
    if: *run-on-release
    needs: compute-release-version
    uses: ./.github/workflows/docker-build-and-push.yml
    with:
      dockerfile: database-migrations/docker/Dockerfile.flyway
      context: database-migrations/
      username: ${{ github.actor }}
      image_name: flyway
      image_version: *version
      registry: *registry
    secrets: *secrets
  build-and-push-ws-server:
    if: *run-on-release
    needs: compute-release-version
    uses: ./.github/workflows/docker-build-and-push.yml
    with:
      dockerfile: ws-server/Dockerfile
      context: ws-server/
      username: ${{ github.actor }}
      image_name: ws-server
      image_version: *version
      registry: *registry
    secrets: *secrets
  e2e-tests:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          cache-dependency-path: nextjs/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: nextjs

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: nextjs-build
          path: nextjs/.next

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
        working-directory: nextjs

      - name: Run Playwright tests
        run: pnpm test:e2e
        working-directory: nextjs

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: nextjs/playwright-report
          retention-days: 30