name: ci

on:
  push:
    branches: [ main, sql-scripts ]
    paths-ignore:
      - 'docs/**'
      - 'nextjs/specs/**'
      - '**/*.example'
      - '**/*.md'
      - '**/.dockerignore'
      - '**/.gitignore'
      - '**/.modified'
      - '.devcontainer/**'
  workflow_dispatch:
      
permissions:
  contents: write
  packages: write

env:
  MARIADB_DOCKERFILE: nextjs/docker/Dockerfile.mariadb
  NGINX_DOCKERFILE: nextjs/docker/Dockerfile.nginx
  FLYWAY_DOCKERFILE: nextjs/docker/Dockerfile.flyway
  WS_DOCKERFILE: ws-server/Dockerfile
  WS_CONTEXT: ws-server/

jobs:
  build-and-push-nextjs-app:
    uses: ./.github/workflows/docker-build-and-push.yml
    with:
      dockerfile: nextjs/docker/Dockerfile.nextjs
      context: nextjs/
      username: ${{ github.actor }}
      image_name: nextjs-app
      image_version: &version 0.0.1
      registry: &registry ghcr.io/${{ github.repository_owner }}
    secrets:
      token: ${{ secrets.GITHUB_TOKEN }}
  build-and-push-mariadb:
    uses: ./.github/workflows/docker-build-and-push.yml
    with:
      dockerfile: nextjs/docker/Dockerfile.mariadb
      context: nextjs/
      username: ${{ github.actor }}
      image_name: mariadb
      image_version: *version
      registry: *registry
    secrets:
      token: ${{ secrets.GITHUB_TOKEN }}

