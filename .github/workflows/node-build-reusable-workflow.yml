on:
  workfow_call:
    inputs:
      node-version:
        description: 'Node.js version to use (e.g., "16", "18", "20", "lts")'
        required: true
        default: 'lts'
      pnpm-version:
        description: 'pnpm version to use (e.g., "8", "9", "latest")'
        required: true
        default: '10'
      working-directory:
        description: 'Working directory for the build (e.g., "nextjs", "ws-server")'
        required: true
        default: '.'
jobs:
  build:

    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v6
      - name: Set up pnpm
        uses: pnpm/action-setup@v4                # Required to cache dependencies (
        with:
          version: ${{ inputs.pnpm-version }}
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install
      - name: Build
        run: pnpm build