name: Feature request
description: Suggest an idea for this project
title: "[FEATURE]: "
labels: ["feature"]
assignees:
  - emanuelegoldin
body:
  - type: markdown
    attributes:
      value: |
        ## Feature Description
  - type: textarea
    attributes:
      label: Describe the feature
      description: Please provide a clear and concise description of the feature you are requesting.
      placeholder: Ex. I would like to have a dark mode for the application.
    validations:
      required: true
  - type: markdown
    attributes:
      value: |
        ## Proposed Solution
  - type: textarea
    attributes:
      label: Describe the solution you'd like
      description: A clear and concise description of what you **want** to happen.
      placeholder: Ex. I would like to have a dark mode option in the settings.
    validations:
      required: true
  - type: upload
    attributes:
      label: Upload screenshots (optional)
      description: If applicable, add screenshots to help explain your feature request.
